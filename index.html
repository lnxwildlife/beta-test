<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>LNX Beta Tester Portal</title>
<meta name="description" content="LNX Wildlife – Beta Tester Portal für den LNX PIR Kamerasensor."/>
<meta name="theme-color" content="#4CAF50"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="LNX Tester"/>
<meta name="mobile-web-app-capable" content="yes"/>
<style>
:root{
  --primary:#4CAF50;--primary-dark:#388E3C;--on-primary:#ffffff;
  --surface:#ffffff;--surface-container:#f3f3f3;--surface-container-low:#f9f9f9;
  --on-surface:#1a1c1c;--on-surface-variant:#666;--outline-variant:#e0e0e0;
  --error:#B00020;--warning:#E65100;--radius:0.75rem;--radius-sm:0.5rem;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--surface);color:var(--on-surface);padding-bottom:80px;line-height:1.5;font-size:14px}
html{background:#4CAF50}

/* OFFLINE BANNER */
#offline-banner{display:none;position:fixed;top:0;left:0;right:0;background:#E65100;color:#fff;text-align:center;font-size:12px;font-weight:700;padding:4px 8px;z-index:999;letter-spacing:.04em}

/* HEADER */
header{position:fixed;top:0;width:100%;background:var(--surface);padding:.5rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--primary);z-index:100;gap:8px}
.logo{height:44px;width:auto;object-fit:contain}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sync-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--surface-container);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#9E9E9E;flex-shrink:0}
.sync-dot.ok{background:var(--primary)}.sync-dot.pending{background:#FF9800}.sync-dot.error{background:var(--error)}

/* LANG TOGGLE */
.lang-toggle{display:flex;background:var(--surface-container);border-radius:100px;padding:2px;gap:2px;border:none}
.lang-btn{border:none;background:transparent;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:800;cursor:pointer;color:var(--on-surface-variant);transition:.2s;letter-spacing:.03em}
.lang-btn.active{background:var(--primary);color:#fff}

/* NAV */
nav{position:fixed;bottom:0;width:100%;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);display:flex;justify-content:space-around;padding:8px 0 20px;border-top:1px solid var(--outline-variant);z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;color:var(--on-surface-variant);text-decoration:none;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;gap:3px;cursor:pointer;border:none;background:none;padding:4px 8px}
.nav-item.active{color:var(--primary)}

/* MAIN */
main{padding-top:68px;padding-left:1rem;padding-right:1rem;max-width:600px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* CARDS */
section{background:var(--surface-container);border-radius:1rem;padding:1.25rem;margin-bottom:1rem}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.section-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1rem}
.badge{background:rgba(76,175,80,.12);color:var(--primary);font-size:9px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:100px;letter-spacing:.05em}
.tile{background:var(--surface);border-radius:var(--radius);padding:1rem;margin-bottom:.625rem}
.tile:last-child{margin-bottom:0}

/* FORM */
.field-label{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--on-surface-variant);margin-bottom:5px;display:block;letter-spacing:.05em}
input[type=text],input[type=number],select,textarea{width:100%;padding:.7rem .875rem;border:1.5px solid var(--outline-variant);background:var(--surface-container-low);border-radius:var(--radius-sm);font-size:14px;outline:none;color:var(--on-surface);font-family:inherit;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:72px}

/* TOGGLE */
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;transition:.3s;border-radius:24px}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
input:checked+.slider{background:var(--primary)}
input:checked+.slider:before{transform:translateX(20px)}

/* SEGMENTED */
.segmented{display:flex;background:var(--surface-container);padding:3px;border-radius:var(--radius);gap:3px}
.segmented input{display:none}
.segmented label{flex:1;text-align:center;padding:7px 4px;font-size:12px;font-weight:600;cursor:pointer;border-radius:var(--radius-sm);transition:.2s;color:var(--on-surface-variant)}
.segmented input:checked+label{background:var(--primary);color:#fff}

/* STARS */
.stars{display:flex;gap:4px}
.stars input{display:none}
.stars label{font-size:26px;cursor:pointer;color:#ddd;transition:.15s;line-height:1}
.stars input:checked~label,.stars label:hover~label,.stars label:hover{color:#FFB300}

/* BUTTONS */
.btn{width:100%;padding:.875rem;border-radius:var(--radius);border:none;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(76,175,80,.25)}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}

/* CHECK ITEMS */
.check-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--outline-variant)}
.check-item:last-child{border-bottom:none;padding-bottom:0}
.check-item-num{background:var(--surface-container);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--on-surface-variant);flex-shrink:0;margin-top:1px}
.check-item-num.done{background:var(--primary);color:#fff}
.check-item-body{flex:1;min-width:0}
.check-item-title{font-weight:600;font-size:13px;margin-bottom:2px}
.check-item-desc{font-size:11px;color:var(--on-surface-variant);line-height:1.4;margin-bottom:.5rem}
.result-select{width:100%;padding:.5rem .75rem;border:1.5px solid var(--outline-variant);border-radius:var(--radius-sm);font-size:13px;background:var(--surface-container-low);color:var(--on-surface)}
.result-select.pass{border-color:var(--primary);background:rgba(76,175,80,.06)}
.result-select.fail{border-color:var(--error);background:rgba(176,0,32,.06)}
.result-select.skip{border-color:#9E9E9E}

/* SECTION DIVIDER */
.section-divider{background:rgba(76,175,80,.1);border-radius:var(--radius-sm);padding:.5rem .875rem;margin:.75rem 0 .25rem;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--primary)}

/* CHECK-IN HISTORY */
.checkin-card{background:var(--surface);border-radius:var(--radius);padding:1rem;margin-bottom:.625rem;border-left:4px solid var(--primary)}
.checkin-card.warn{border-left-color:var(--warning)}
.checkin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.checkin-date{font-weight:700;font-size:13px}
.checkin-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.375rem}
.chip{background:var(--surface-container);border-radius:100px;padding:2px 10px;font-size:11px;font-weight:600;color:var(--on-surface-variant)}
.chip.ok{background:rgba(76,175,80,.12);color:var(--primary)}
.chip.nok{background:rgba(176,0,32,.1);color:var(--error)}

/* PROGRESS */
.progress-bar{height:6px;background:var(--outline-variant);border-radius:3px;overflow:hidden;margin-top:.5rem}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:.4s}

/* STATUS BANNER */
.status-banner{border-radius:var(--radius);padding:.875rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;font-size:13px;font-weight:600}
.status-banner.info{background:rgba(76,175,80,.1);color:var(--primary-dark)}
.status-banner.warn{background:rgba(230,81,0,.1);color:var(--warning)}
.status-banner.error{background:rgba(176,0,32,.1);color:var(--error)}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1c1c;color:#fff;padding:.625rem 1.25rem;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MISC */
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mt{margin-top:.75rem}
.gap{gap:.625rem;display:flex;flex-direction:column}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.625rem}
.text-muted{color:var(--on-surface-variant);font-size:12px}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--on-surface-variant)}
.empty-state svg{opacity:.3;margin-bottom:.75rem}
</style>
</head>

// ══════════════════════════════════════════════════════════
// STATE & LANG
// ══════════════════════════════════════════════════════════
const STORE_KEY = 'lnx_tester_v1';
const SHEET_URL_PRESET = '';
let DB = { profil:{}, initcheck:{}, checkins:[], survey:{} };
let dirty = false;
let currentLang = 'de';

function t(key) { return TRANSLATIONS[currentLang][key] || TRANSLATIONS['de'][key] || key; }

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lnx_lang', lang);
  document.getElementById('btn-de').classList.toggle('active', lang==='de');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.documentElement.lang = lang;
  applyTranslations();
  renderInitItems();
  renderSurveyItems();
  renderCheckinHistory();
  updateProgress();
  checkOverdue();
  applyPlaceholders();
}

function applyTranslations() {
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.dataset.t;
    el.textContent = t(key);
  });
  // Offline banner
  const ob = document.getElementById('offline-banner');
  if(ob) ob.textContent = t('offlineBanner');
}

function applyPlaceholders() {
  document.querySelectorAll('[data-ph]').forEach(el => {
    el.placeholder = t(el.dataset.ph);
  });
}

// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
function load() {
  try { const s = localStorage.getItem(STORE_KEY); if(s) DB = JSON.parse(s); } catch(e){}
  if(!DB.checkins) DB.checkins=[];
  if(!DB.initcheck) DB.initcheck={};
  if(!DB.survey) DB.survey={};
  if(!DB.profil) DB.profil={};
  currentLang = localStorage.getItem('lnx_lang') || 'de';
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(DB));
  dirty = false;
  updateSyncDot('ok');
}

function markDirty() { dirty=true; updateSyncDot('pending'); }

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  load();
  applyTranslations();
  applyPlaceholders();
  document.getElementById('btn-'+currentLang).classList.add('active');
  document.getElementById('btn-'+(currentLang==='de'?'en':'de')).classList.remove('active');
  renderInitItems();
  renderSurveyItems();
  restoreProfil();
  renderCheckinHistory();
  updateProgress();
  checkOverdue();
  const today = new Date().toLocaleDateString('de-CH');
  const ciDate = document.getElementById('ci-date');
  if(ciDate && !ciDate.value) ciDate.value = today;
  if(SHEET_URL_PRESET && !DB.profil?.sheetUrl) {
    DB.profil.sheetUrl = SHEET_URL_PRESET;
    const el = document.getElementById('p-sheeturl');
    if(el) el.value = SHEET_URL_PRESET;
    save();
  }
  updateSyncDot(DB.profil?.sheetUrl ? 'pending' : 'error');
  if(!DB.profil?.sheetUrl) document.getElementById('setup-banner').style.display='flex';
});

// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  updateProgress();
}

// ══════════════════════════════════════════════════════════
// INIT CHECK
// ══════════════════════════════════════════════════════════
function renderInitItems() {
  const container = document.getElementById('init-items');
  container.innerHTML = '';
  getInitItems(currentLang).forEach(item => {
    if(item.section !== undefined) {
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.textContent = item.section;
      container.appendChild(div);
      return;
    }
    const saved = DB.initcheck[item.n] || { result:'', notes:'' };
    const done = saved.result === 'Bestanden' || saved.result === 'Passed';
    const div = document.createElement('div');
    div.className = 'check-item';
    div.id = 'init-item-'+item.n;
    div.innerHTML = `
      <div class="check-item-num ${done?'done':''}" id="num-${item.n}">${done?'✓':item.n}</div>
      <div class="check-item-body">
        <div class="check-item-title">${item.title}</div>
        <div class="check-item-desc">${item.desc}</div>
        ${item.setting ? `<div class="text-muted" style="margin-bottom:.375rem">⚙ ${item.setting}</div>` : ''}
        <select class="result-select ${getResultClass(saved.result)}" onchange="saveInitResult(${item.n},this.value)">
          <option value="">${t('resultEmpty')}</option>
          <option value="Passed" ${done?'selected':''}>${t('resultPass')}</option>
          <option value="Failed" ${saved.result==='Failed'||saved.result==='Fehlgeschlagen'?'selected':''}>${t('resultFail')}</option>
          <option value="Not possible" ${saved.result==='Not possible'||saved.result==='Nicht möglich'?'selected':''}>${t('resultSkip')}</option>
        </select>
        <div style="margin-top:.375rem">
          <input type="text" placeholder="${t('notePlaceholder')}" value="${saved.notes||''}"
            onchange="saveInitNotes(${item.n},this.value)" style="font-size:12px;padding:.5rem .75rem"/>
        </div>
      </div>`;
    container.appendChild(div);
  });
}

function getResultClass(r) {
  if(!r) return '';
  if(r==='Passed'||r==='Bestanden') return 'pass';
  if(r==='Failed'||r==='Fehlgeschlagen') return 'fail';
  return 'skip';
}

function saveInitResult(n, val) {
  if(!DB.initcheck[n]) DB.initcheck[n]={};
  DB.initcheck[n].result = val;
  const numEl = document.getElementById('num-'+n);
  const sel = document.querySelector('#init-item-'+n+' .result-select');
  const passed = val==='Passed'||val==='Bestanden';
  if(passed){ numEl.classList.add('done'); numEl.textContent='✓'; }
  else { numEl.classList.remove('done'); numEl.textContent=n; }
  if(sel) sel.className = 'result-select '+getResultClass(val);
  save(); updateProgress();
}

function saveInitNotes(n, val) {
  if(!DB.initcheck[n]) DB.initcheck[n]={};
  DB.initcheck[n].notes = val;
  save();
}

// ══════════════════════════════════════════════════════════
// PROFIL
// ══════════════════════════════════════════════════════════
function restoreProfil() {
  const p = DB.profil;
  if(!p) return;
  ['name','sensor','camera','instagram','facebook','social','battery','startdate','sheeturl'].forEach(k => {
    const el = document.getElementById('p-'+k);
    if(el && p[k !== 'sheeturl' ? k : 'sheetUrl']) el.value = p[k !== 'sheeturl' ? k : 'sheetUrl'] || '';
  });
}

function saveProfil() {
  if(!v('p-name')){ toast(t('toastNoName')); return; }
  if(!v('p-sensor')){ toast(t('toastNoSensor')); return; }
  DB.profil = {
    name: v('p-name'), sensor: v('p-sensor'), camera: v('p-camera'),
    instagram: v('p-instagram'), facebook: v('p-facebook'), social: v('p-social'),
    battery: v('p-battery'), startdate: v('p-startdate'),
    sheetUrl: v('p-sheeturl') || SHEET_URL_PRESET
  };
  const noSheet = !DB.profil.sheetUrl;
  document.getElementById('setup-banner').style.display = noSheet ? 'flex' : 'none';
  save(); toast(t('toastProfil'));
}

function testConnection() {
  const url = v('p-sheeturl') || SHEET_URL_PRESET;
  if(!url){ toast(t('toastNoUrl')); return; }
  toast(t('toastTesting'));
  fetch(url+'?action=ping').then(r=>r.json())
    .then(()=>{ updateSyncDot('ok'); toast(t('toastTestOk')); })
    .catch(()=>{ updateSyncDot('error'); toast(t('toastConnFail')); });
}

// ══════════════════════════════════════════════════════════
// CHECK-IN
// ══════════════════════════════════════════════════════════
function saveCheckin() {
  const ci = {
    id: Date.now(),
    date: v('ci-date'), period: v('ci-period'), camera: v('ci-camera'),
    opmode: getRadio('ci-opmode'), capmode: getRadio('ci-capmode'),
    triggers: v('ci-triggers'), falseTriggers: v('ci-false'),
    ok: getRadio('ci-ok'), bug: getRadio('ci-bug'), rating: getRadio('ci-rating'),
    notes: v('ci-notes'), ts: new Date().toISOString()
  };
  if(!ci.date){ toast(t('toastNoDate')); return; }
  DB.checkins.unshift(ci);
  save(); resetCheckinForm(); renderCheckinHistory(); updateProgress(); checkOverdue();
  toast(t('toastProfil').replace('Profil','Check-in'));
  markDirty();
}

function resetCheckinForm() {
  ['ci-date','ci-period','ci-camera','ci-triggers','ci-false','ci-notes'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.querySelectorAll('[name^="ci-"]').forEach(el=>el.checked=false);
  const today = new Date().toLocaleDateString('de-CH');
  const ciDate = document.getElementById('ci-date');
  if(ciDate) ciDate.value = today;
}

function renderCheckinHistory() {
  const el = document.getElementById('checkin-history');
  const count = document.getElementById('checkin-count-badge');
  if(!DB.checkins||!DB.checkins.length) {
    el.innerHTML=`<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg><p>${t('emptyHistory')}</p></div>`;
    count.textContent='0'; return;
  }
  count.textContent=DB.checkins.length;
  const isOk = v => v==='Yes'||v==='Ja';
  const isPartly = v => v==='Partly'||v==='Teilweise';
  el.innerHTML = DB.checkins.map(ci=>{
    const stars = ci.rating?'★'.repeat(+ci.rating)+'☆'.repeat(5-+ci.rating):'—';
    const okLabel = isOk(ci.ok)?t('chipOk'):isPartly(ci.ok)?t('chipPartly'):t('chipProblem');
    const okClass = isOk(ci.ok)?'ok':ci.ok&&!isPartly(ci.ok)?'nok':'';
    const hasBug = ci.bug&&ci.bug!=='No'&&ci.bug!=='Nein';
    const trigs = (ci.triggers||ci.falseTriggers)?`<span class="chip">🔍 ${ci.triggers||'?'} / ${ci.falseTriggers||'0'}</span>`:'';
    return `<div class="checkin-card ${isOk(ci.ok)?'':'warn'}">
      <div class="checkin-header"><span class="checkin-date">${ci.date}${ci.period?' · '+ci.period:''}</span><span style="font-size:12px;color:#FFB300">${stars}</span></div>
      <div class="checkin-meta">
        ${ci.camera?`<span class="chip">📷 ${ci.camera}</span>`:''}
        ${ci.opmode?`<span class="chip">${ci.opmode}</span>`:''}
        ${ci.capmode?`<span class="chip">${ci.capmode}</span>`:''}
        ${trigs}
        ${ci.ok?`<span class="chip ${okClass}">${okLabel}</span>`:''}
        ${hasBug?`<span class="chip nok">${t('chipBug')}</span>`:''}
      </div>
      ${ci.notes?`<p class="text-muted" style="font-size:12px">${ci.notes}</p>`:''}
      <button onclick="deleteCheckin(${ci.id})" style="background:none;border:none;color:var(--error);font-size:11px;font-weight:700;cursor:pointer;padding:.25rem 0;text-transform:uppercase;letter-spacing:.04em">${t('btnDelete')}</button>
    </div>`;
  }).join('');
}

function deleteCheckin(id) {
  if(!confirm(t('deleteCheckin'))) return;
  DB.checkins=DB.checkins.filter(c=>c.id!==id);
  save(); renderCheckinHistory(); updateProgress(); checkOverdue();
}

// SURVEY
// ══════════════════════════════════════════════════════════
function renderSurveyItems() {
  const container = document.getElementById('survey-items');
  container.innerHTML='';
  getSurveyItems(currentLang).forEach(item=>{
    if(item.section){
      const div=document.createElement('div');
      div.className='section-divider'; div.textContent=item.section;
      container.appendChild(div); return;
    }
    const saved = DB.survey[item.n]||'';
    const div=document.createElement('div');
    div.className='tile'; div.style.marginBottom='.5rem';
    if(item.type==='rating'){
      div.innerHTML=`<div class="text-muted" style="margin-bottom:.5rem;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em">${item.n}. ${item.q}</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${[1,2,3,4,5].map(v=>`<label style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer">
            <div data-val="${v}" data-q="${item.n}" onclick="surveyStarClick(this)" style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:${saved==v?'rgba(76,175,80,.15)':'var(--surface-container)'};cursor:pointer;transition:.15s">
              ${v<=(saved||0)?'★':'☆'}
            </div><span style="font-size:9px;font-weight:700;color:var(--on-surface-variant)">${v}</span>
          </label>`).join('')}
        </div>`;
    } else {
      div.innerHTML=`<label class="field-label">${item.n}. ${item.q}</label>
        <textarea onchange="saveSurveyItem(${item.n},this.value)" placeholder="${currentLang==='en'?'Your answer…':'Deine Antwort…'}" style="min-height:60px">${saved}</textarea>`;
    }
    container.appendChild(div);
  });
}

function surveyStarClick(el) {
  const q=el.dataset.q, val=el.dataset.val;
  saveSurveyItem(q,val);
  document.querySelectorAll(`[data-q="${q}"]`).forEach(s=>{
    s.innerHTML=parseInt(s.dataset.val)<=parseInt(val)?'★':'☆';
    s.style.background=s.dataset.val==val?'rgba(76,175,80,.2)':'var(--surface-container)';
  });
}

function saveSurveyItem(n,val){ DB.survey[n]=val; save(); updateProgress(); markDirty(); }

function saveSurvey() {
  save(); markDirty();
  toast(t('toastSurveySaved'));
  if(DB.profil?.sheetUrl||SHEET_URL_PRESET) syncToSheet();
}

// ══════════════════════════════════════════════════════════
// PROGRESS + OVERDUE
// ══════════════════════════════════════════════════════════
function updateProgress() {
  const doneInit=Object.values(DB.initcheck).filter(v=>v.result&&v.result!=='').length;
  document.getElementById('prog-init').style.width=Math.round(doneInit/26*100)+'%';
  document.getElementById('prog-init-label').textContent=doneInit+' / 26';
  document.getElementById('init-progress-badge').textContent=doneInit+' / 26';
  const n=DB.checkins?.length||0;
  document.getElementById('prog-checkin-label').textContent=n+' '+(n===1?t('progressCheckins'):t('progressCheckins2'));
  document.getElementById('checkin-count-badge').textContent=n;
  const doneSurvey=Object.keys(DB.survey).length;
  document.getElementById('prog-survey').style.width=Math.round(doneSurvey/23*100)+'%';
  document.getElementById('prog-survey-label').textContent=doneSurvey+' / 23';
  document.getElementById('survey-badge').textContent=doneSurvey+' / 23';
}

function checkOverdue() {
  const b1=document.getElementById('overdue-banner');
  const b2=document.getElementById('checkin-overdue');
  if(!DB.checkins?.length){ b1.style.display='none'; b2.style.display='none'; return; }
  const days=Math.floor((new Date()-new Date(DB.checkins[0].ts))/(864e5));
  const od=days>=14;
  const msg=t('overdueMsg');
  document.getElementById('overdue-msg').textContent=msg;
  b1.style.display=od?'flex':'none';
  b2.style.display=od?'flex':'none';
}

// ══════════════════════════════════════════════════════════
// SYNC TO SHEET
// ══════════════════════════════════════════════════════════
function syncToSheet() {
  const url=DB.profil?.sheetUrl||SHEET_URL_PRESET;
  if(!url){ toast(t('toastNoUrl')); return; }
  if(!DB.profil?.sensor){ toast(t('toastNoSensor')); return; }
  updateSyncDot('pending'); toast(t('toastSyncing'));
  const payload={action:'saveAll',tester:DB.profil,initcheck:DB.initcheck,checkins:DB.checkins,survey:DB.survey};
  fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'action=saveAll&data='+encodeURIComponent(JSON.stringify(payload))})
    .then(r=>r.json())
    .then(d=>{ if(d.success){updateSyncDot('ok');toast(t('toastSyncOk'));dirty=false;} else{updateSyncDot('error');toast('Error: '+(d.error||'?'));} })
    .catch(()=>{ updateSyncDot('error'); toast(t('toastConnFail')); });
}

// ══════════════════════════════════════════════════════════
// LOAD FROM SHEET
// ══════════════════════════════════════════════════════════
function loadFromSheet() {
  const url=v('p-sheeturl')||DB.profil?.sheetUrl||SHEET_URL_PRESET;
  const sensor=v('p-sensor')||DB.profil?.sensor;
  const name=v('p-name')||DB.profil?.name;
  if(!url){ toast(t('toastNoUrl')); return; }
  if(!sensor&&!name){ toast(t('toastNoSensor')); return; }
  toast(t('toastLoading')); updateSyncDot('pending');
  fetch(url+'?'+new URLSearchParams({action:'loadTester',sensorNr:sensor||'',name:name||''}))
    .then(r=>r.json())
    .then(d=>{
      if(!d.found){ updateSyncDot('error'); toast(t('toastNotFound')); return; }
      if(d.profil) DB.profil={...DB.profil,...d.profil,sheetUrl:url};
      if(d.initcheck&&Object.keys(d.initcheck).length) DB.initcheck=d.initcheck;
      if(d.checkins?.length){
        const localIds=new Set((DB.checkins||[]).map(c=>String(c.id)));
        DB.checkins=[...(DB.checkins||[]),...d.checkins.filter(c=>!localIds.has(String(c.id)))].sort((a,b)=>new Date(b.ts||0)-new Date(a.ts||0));
      }
      if(d.survey&&Object.keys(d.survey).length) DB.survey={...DB.survey,...d.survey};
      save(); restoreProfil(); renderInitItems(); renderSurveyItems(); renderCheckinHistory(); updateProgress();
      updateSyncDot('ok');
      toast(`${t('toastLoadedOk')} — ${d.checkins?.length||0} ${t('checkinsLoaded')}`);
    })
    .catch(()=>{ updateSyncDot('error'); toast(t('toastConnFail')); });
}

function updateSyncDot(state) { document.getElementById('syncDot').className='sync-dot '+state; }

// ══════════════════════════════════════════════════════════
// OFFLINE + IOS NUDGE
// ══════════════════════════════════════════════════════════
function updateOnlineStatus() {
  const banner=document.getElementById('offline-banner');
  if(!navigator.onLine){
    banner.style.display='block'; banner.textContent=t('offlineBanner');
    document.querySelector('header').style.top='28px';
  } else {
    banner.style.display='none';
    document.querySelector('header').style.top='0';
  }
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);
updateOnlineStatus();

function showInstallNudge() {
  const isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  if(isIOS&&!window.navigator.standalone&&!localStorage.getItem('lnx_nudge')) {
    localStorage.setItem('lnx_nudge','1');
    setTimeout(()=>toast(t('iosNudge')),3000);
  }
}
showInstallNudge();

// ══════════════════════════════════════════════════════════
// AUTO-MERGE (nach Sync: Sheet-Stand holen und lokal mergen)
// ══════════════════════════════════════════════════════════
function autoMergeFromSheet() {{
  const url = DB.profil?.sheetUrl || SHEET_URL_PRESET;
  const sensor = DB.profil?.sensor;
  const name   = DB.profil?.name;
  if(!url || (!sensor && !name)) return;

  fetch(url+'?'+new URLSearchParams({{action:'loadTester',sensorNr:sensor||'',name:name||''}}))
    .then(r=>r.json())
    .then(d=>{{
      if(!d.found) return;
      // Check-ins mergen: Sheet kann mehr haben als lokal (anderes Gerät)
      if(d.checkins?.length) {{
        const localIds = new Set((DB.checkins||[]).map(c=>String(c.id)));
        const newFromSheet = d.checkins.filter(c=>!localIds.has(String(c.id)));
        if(newFromSheet.length) {{
          DB.checkins = [...(DB.checkins||[]), ...newFromSheet]
            .sort((a,b)=>new Date(b.ts||0)-new Date(a.ts||0));
          save();
          renderCheckinHistory();
          updateProgress();
          // Stiller Hinweis wenn neue Daten von anderem Gerät gefunden
          toast('↓ '+newFromSheet.length+' neue Check-in(s) vom anderen Gerät übernommen');
        }}
      }}
    }})
    .catch(()=>{{}}); // Still scheitern ist OK
}}

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function v(id){ const el=document.getElementById(id); return el?el.value.trim():''; }
function getRadio(name){ const el=document.querySelector(`[name="${name}"]:checked`); return el?el.value:''; }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
